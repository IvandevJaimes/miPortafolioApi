<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo mensaje de contacto del portafolio</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
    "
  >
    <table width="100%" border="0" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <!-- Card principal -->
          <table
            width="100%"
            style="
              max-width: 500px;
              background: #111;
              border-radius: 16px;
              overflow: hidden;
            "
            border="0"
            cellspacing="0"
            cellpadding="0"
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
                  padding: 30px;
                  text-align: center;
                "
              >
                <h1
                  style="
                    margin: 0;
                    color: #000;
                    font-size: 24px;
                    font-weight: 700;
                    text-transform: uppercase;
                    letter-spacing: 2px;
                  "
                >
                  ✉️ Nuevo Mensaje
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 30px">
                <!-- Campo Nombre -->
                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="padding-bottom: 8px">
                      <span
                        style="
                          color: #00ff88;
                          font-size: 12px;
                          font-weight: 600;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                      >
                        👤 Nombre
                      </span>
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        background: #1a1a1a;
                        padding: 12px 16px;
                        border-radius: 8px;
                        border: 1px solid #222;
                      "
                    >
                      <span style="color: #fff; font-size: 16px">{{name}}</span>
                    </td>
                  </tr>
                </table>
                <table
                  width="100%"
                  border="0"
                  cellspacing="0"
                  cellpadding="0"
                  style="margin-top: 20px"
                >
                  <tr>
                    <td style="padding-bottom: 8px">
                      <span
                        style="
                          color: #00ff88;
                          font-size: 12px;
                          font-weight: 600;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                      >
                        📧 Email
                      </span>
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        background: #1a1a1a;
                        padding: 12px 16px;
                        border-radius: 8px;
                        border: 1px solid #222;
                      "
                    >
                      <a
                        href="mailto:{{email}}"
                        style="
                          color: #00ff88;
                          font-size: 16px;
                          text-decoration: none;
                        "
                        >{{email}}</a
                      >
                    </td>
                  </tr>
                </table>
                <table
                  width="100%"
                  border="0"
                  cellspacing="0"
                  cellpadding="0"
                  style="margin-top: 20px"
                >
                  <tr>
                    <td style="padding-bottom: 8px">
                      <span
                        style="
                          color: #00ff88;
                          font-size: 12px;
                          font-weight: 600;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                      >
                        💬 Mensaje
                      </span>
                    </td>
                  </tr>
                  <tr>
                    <td
                      style="
                        background: #1a1a1a;
                        padding: 16px;
                        border-radius: 8px;
                        border: 1px solid #222;
                      "
                    >
                      <p
                        style="
                          margin: 0;
                          color: #ccc;
                          font-size: 15px;
                          line-height: 1.6;
                        "
                      >
                        {{message}}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
